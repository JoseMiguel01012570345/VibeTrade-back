services:
  # Opcional: `docker compose up -d elasticsearch` y luego Elasticsearch:Enabled=true + Uri http://localhost:9200
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vibetrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-vibetrade}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - vibetrade_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibetrade} -d ${POSTGRES_DB:-vibetrade}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_HTTP_PORT:-5110}:8080"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      ASPNETCORE_URLS: http://+:8080
      # Production env does not load appsettings.Development.json; enable seed explicitly for local Docker.
      DemoSeed__Enabled: "${DEMO_SEED_ENABLED:-true}"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

volumes:
  vibetrade_pgdata:
    # Sin esto, Compose crea algo como `nombre_carpeta_vibetrade_pgdata` y al mover/renombrar el repo aparece una BD “vacía”.
    name: vibetrade_pgdata
