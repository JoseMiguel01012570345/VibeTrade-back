services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vibetrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-vibetrade}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - vibetrade_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibetrade} -d ${POSTGRES_DB:-vibetrade}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_HTTP_PORT:-5110}:8080"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  vibetrade_pgdata:
